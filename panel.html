<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <style>
    :root {
      --bg-color: #ffffff;
      --text-color: #333333;
      --border-color: #e0e0e0;
      --hover-bg: #f5f5f5;
      --method-color: #d03030;
      /* Red-ish for POST usually, or blue */
      --url-color: #666;
      --details-bg: #fafafa;
      --pre-color: #242424;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-color: #242424;
        --text-color: #d1d1d1;
        --border-color: #333;
        --hover-bg: #2a2a2a;
        --method-color: #61afef;
        --url-color: #999;
        --details-bg: #1e1e1e;
        --pre-color: #d1d1d1;
      }
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 0;
      background-color: var(--bg-color);
      color: var(--text-color);
    }

    #request-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .request-item {
      border-bottom: 1px solid var(--border-color);
      cursor: pointer;
    }

    .request-summary {
      padding: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .request-summary:hover {
      background-color: var(--hover-bg);
    }

    .method-name {
      font-weight: bold;
      color: var(--method-color);
    }

    .url-preview {
      font-size: 0.85em;
      color: var(--url-color);
      margin-left: 10px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 300px;
    }

    .request-details {
      display: none;
      padding: 10px;
      background-color: var(--details-bg);
      border-top: 1px solid var(--border-color);
      font-family: monospace;
      white-space: pre-wrap;
      word-break: break-all;
      font-size: 12px;
      color: var(--pre-color);
    }

    .request-item.expanded .request-details {
      display: block;
    }

    button {
      background-color: #4a90e2;
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }

    button:hover {
      background-color: #357abd;
    }

    .empty-state {
      padding: 20px;
      text-align: center;
      color: var(--url-color);
    }
  </style>
</head>

<body>
  <div
    style="padding: 10px; border-bottom: 1px solid var(--border-color); background: var(--bg-color); display: flex; justify-content: flex-end;">
    <button id="settings-toggle"
      style="background: none; border: none; font-size: 16px; cursor: pointer; color: var(--text-color);">⚙️</button>
  </div>
  <div id="config-section"
    style="padding: 10px; border-bottom: 1px solid var(--border-color); background: var(--hover-bg); display: none;">
    <input type="password" id="api-key" placeholder="Enter Tenderly API Key"
      style="padding: 5px; width: 100%; margin-bottom: 5px; box-sizing: border-box;">
    <div style="display: flex; gap: 5px;">
      <input type="text" id="account-slug" placeholder="Account Slug" style="padding: 5px; flex: 1;">
      <input type="text" id="project-slug" placeholder="Project Slug" style="padding: 5px; flex: 1;">
    </div>
    <button id="save-config" style="margin-top: 5px; width: 100%;">Save Configuration</button>
    <span id="save-status"
      style="margin-top: 5px; display: block; text-align: center; font-size: 12px; color: green; display: none;">Saved!</span>
  </div>
  <div id="request-list">
    <div class="empty-state">Waiting for eth_estimateGas requests...</div>
  </div>
  <script src="panel.js"></script>
</body>

</html>
