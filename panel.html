<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tenderly DevTools</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <header>
    <h1>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2C6.48 2 2 6.48 2 12C2 17.52 6.48 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2Z"
          fill="#7D69FF" />
        <path d="M8 12H16M12 8V16" stroke="white" stroke-width="2" stroke-linecap="round" />
      </svg>
      Simulate Requests
    </h1>
    <button id="settings-toggle" class="icon-btn" title="Settings">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"></circle>
        <path
          d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
        </path>
      </svg>
    </button>
  </header>

  <div id="config-section" style="display: none;">
    <div class="input-group">
      <input type="password" id="api-key" placeholder="Tenderly API Key">
    </div>
    <div class="input-row">
      <input type="text" id="account-slug" placeholder="Account Slug">
      <input type="text" id="project-slug" placeholder="Project Slug">
    </div>
    <button id="save-config" class="btn-primary" style="width: 100%; margin-top: 12px;">
      Save Configuration
    </button>
    <div id="save-status"
      style="text-align: center; margin-top: 8px; font-size: 12px; color: var(--accent-success); display: none;">
      Settings Saved Successfully
    </div>
  </div>

  <main id="request-list">
    <div class="empty-state">
      <div class="empty-icon">📡</div>
      <p>Listening for <code>eth_estimateGas</code> requests...</p>
      <small>Requests will appear here as you browse.</small>
    </div>
  </main>

  <script src="panel.js"></script>
</body>

</html>
